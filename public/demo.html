<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time 3D Bus Tracking Simulation</title>
  
  <!-- Mapbox GL JS -->
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
  
  <!-- Tailwind for quick styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
    
    .ui-overlay { position: absolute; top: 24px; left: 24px; z-index: 10; width: 340px; }
    
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 
      0% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 0 rgba(239, 68, 68, 0.4); } 
      50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); } 
      100% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 0 rgba(239, 68, 68, 0); } 
    }
    
    .bus-marker { 
      width: 44px; height: 44px; 
      background: #14b8a6; 
      border: 3px solid #fff; 
      border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; 
      box-shadow: 0 0 20px rgba(20,184,166,0.8), 0 10px 20px rgba(0,0,0,0.5); 
      transform-style: preserve-3d;
    }
    
    .glass-panel {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay glass-panel rounded-2xl p-6 shadow-2xl text-white relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-teal-500/10 to-transparent pointer-events-none"></div>
  
  <div class="flex items-center justify-between mb-6 relative">
    <div>
      <h1 class="text-2xl font-black tracking-tight text-white">TransitPulse</h1>
      <p class="text-xs text-slate-400 font-semibold tracking-widest uppercase mt-1">3D Live Simulation</p>
    </div>
    <div class="flex flex-col items-end gap-1">
      <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/10">
        <span class="w-2.5 h-2.5 rounded-full bg-red-500 pulse" id="live-indicator" style="display: none;"></span>
        <span class="text-xs font-bold tracking-wider text-slate-300" id="status-text">OFFLINE</span>
      </div>
    </div>
  </div>
  
  <div class="grid grid-cols-2 gap-3 mb-6 relative">
    <div class="bg-black/40 rounded-xl p-4 border border-white/5 text-center transition-all">
      <p class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Live Speed</p>
      <p class="text-3xl font-mono font-bold text-teal-400 drop-shadow-[0_0_10px_rgba(20,184,166,0.4)]" id="speed">
        0 <span class="text-xs text-slate-500 font-sans">km/h</span>
      </p>
    </div>
    <div class="bg-black/40 rounded-xl p-4 border border-white/5 text-center transition-all">
      <p class="text-[10px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Estimated ETA</p>
      <p class="text-3xl font-mono font-bold text-white" id="eta">--<span class="text-xs text-slate-500 font-sans ml-1">min</span></p>
    </div>
  </div>
  
  <button id="start-btn" class="relative w-full py-4 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-sm transition-all hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(20,184,166,0.4)] hover:shadow-[0_0_30px_rgba(20,184,166,0.6)]">
    Initiate Simulation
  </button>
</div>

<script>
  // 1. Initialize Mapbox
  mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN_HERE'; // Replace with your token when running locally
  
  // High-density urban route (New York City core)
  const START = [-73.9851, 40.7589]; // Times Square
  const END = [-74.0060, 40.7128];   // City Hall

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11', // Very sleek dark map
    center: START,
    zoom: 15.5,
    pitch: 60,
    bearing: -20,
    antialias: true
  });

  // Create Bus Marker
  const markerEl = document.createElement('div');
  markerEl.className = 'bus-marker';
  markerEl.innerHTML = `
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
      <line x1="4" y1="22" x2="4" y2="15"></line>
    </svg>`;

  const marker = new mapboxgl.Marker({ element: markerEl })
    .setLngLat(START)
    .addTo(map);

  let routeCoordinates = [];

  // Wait for map load
  map.on('style.load', async () => {
    
    // 6. 3D Effect - Add Extruded Buildings
    map.insertLayer({
      id: '3d-buildings',
      source: 'composite',
      'source-layer': 'building',
      filter: ['==', 'extrude', 'true'],
      type: 'fill-extrusion',
      minzoom: 14,
      paint: {
        'fill-extrusion-color': '#1f2937',
        'fill-extrusion-height': ['get', 'height'],
        'fill-extrusion-base': ['get', 'min_height'],
        'fill-extrusion-opacity': 0.7
      }
    });

    // 2. Mapbox Directions API
    const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${START[0]},${START[1]};${END[0]},${END[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;
    const res = await fetch(url);
    const data = await res.json();
    
    routeCoordinates = data.routes[0].geometry.coordinates;

    // 3. Draw Route Line
    map.addSource('route', {
      type: 'geojson',
      data: {
        type: 'Feature',
        properties: {},
        geometry: { type: 'LineString', coordinates: routeCoordinates }
      }
    });

    map.addLayer({
      id: 'route-layer',
      type: 'line',
      source: 'route',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 
        'line-color': '#14b8a6', 
        'line-width': 8, 
        'line-opacity': 0.5 
      }
    });
  });

  // Maths for smooth interpolation
  function interpolate(start, end, progress) {
    return [
      start[0] + (end[0] - start[0]) * progress,
      start[1] + (end[1] - start[1]) * progress
    ];
  }

  // Calculate bearing (rotation angle) from point A to B
  function calculateBearing(start, end) {
    const rx1 = start[0] * Math.PI / 180;
    const ry1 = start[1] * Math.PI / 180;
    const rx2 = end[0] * Math.PI / 180;
    const ry2 = end[1] * Math.PI / 180;
    const dLon = rx2 - rx1;
    const y = Math.sin(dLon) * Math.cos(ry2);
    const x = Math.cos(ry1) * Math.sin(ry2) - Math.sin(ry1) * Math.cos(ry2) * Math.cos(dLon);
    return Math.atan2(y, x) * 180 / Math.PI;
  }

  // Engine State
  let i = 0;
  let startTime = null;
  const DURATION_PER_SEGMENT = 1200; // ms per coordinate jump (controls general bus mapping speed)

  // 4 & 5 & 7. 60FPS Smooth Animation and Camera Lock
  function animateFrame(timestamp) {
    if (!startTime) startTime = timestamp;
    const rawProgress = (timestamp - startTime) / DURATION_PER_SEGMENT;
    const progress = Math.min(rawProgress, 1);

    if (i < routeCoordinates.length - 1) {
      const startCoord = routeCoordinates[i];
      const endCoord = routeCoordinates[i + 1];
      
      // Interpolate current pos
      const currentCoord = interpolate(startCoord, endCoord, progress);
      
      // Move Marker
      marker.setLngLat(currentCoord);
      
      // Target camera bearing
      const targetBearing = calculateBearing(startCoord, endCoord);

      // Lock Camera (Wow Effect)
      map.easeTo({
        center: currentCoord,
        bearing: targetBearing, // Follows the road rotation completely
        pitch: 65,              // Dynamic intense tilt
        zoom: 16.5,
        duration: 0,            // 0 duration allows 60fps jumping without stutter 
        easing: t => t
      });

      // Frame continuation check
      if (progress < 1) {
        requestAnimationFrame(animateFrame);
      } else {
        i++;
        startTime = null; // reset for next coordinate tier
        
        // UI Updates randomly to simulate realistic GPS fluctuation
        document.getElementById('speed').innerHTML = `${Math.floor(Math.random() * 15 + 30)} <span class="text-xs text-slate-500 font-sans">km/h</span>`;
        // ETA counts down
        document.getElementById('eta').innerHTML = `${Math.max(1, Math.ceil((routeCoordinates.length - i) * (DURATION_PER_SEGMENT / 1000) / 60))}<span class="text-xs text-slate-500 font-sans ml-1">min</span>`;
        
        requestAnimationFrame(animateFrame);
      }
    } else {
      // Reached End
      document.getElementById('status-text').innerText = 'ARRIVED';
      document.getElementById('status-text').classList.replace('text-red-400', 'text-teal-400');
      document.getElementById('live-indicator').style.display = 'none';
      document.getElementById('speed').innerHTML = `0 <span class="text-xs text-slate-500 font-sans">km/h</span>`;
    }
  }

  // Boot UI
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('live-indicator').style.display = 'block';
    
    document.getElementById('status-text').innerText = 'LIVE TRACKING';
    document.getElementById('status-text').classList.replace('text-slate-300', 'text-red-400');
    
    // Begin 60FPS loop
    requestAnimationFrame(animateFrame);
  });

</script>
</body>
</html>
