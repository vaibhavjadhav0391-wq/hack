<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Bus Fleet Simulation</title>
  
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #000; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    
    .ui-panel { position: absolute; top: 20px; left: 20px; width: 340px; z-index: 10; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    
    /* Markers */
    .bus-marker {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      cursor: pointer; transition: transform 0.2s;
    }
    .bus-marker:hover { transform: scale(1.1); }
    .bus-marker.selected { box-shadow: 0 0 25px currentColor; transform: scale(1.2); }
    
    .stop-marker {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    
    /* Pulses */
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 
      0% { box-shadow: 0 0 0 0px currentColor; } 
      100% { box-shadow: 0 0 0 15px transparent; } 
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Fleet Active Status (Top Right) -->
<div class="absolute top-5 right-5 z-10 glass px-4 py-2 rounded-xl text-white flex items-center gap-3">
  <div class="w-3 h-3 bg-emerald-400 rounded-full pulse text-emerald-400"></div>
  <span class="font-bold tracking-widest text-sm uppercase">3 Buses Live</span>
</div>

<!-- Dashboard UI (Left) -->
<div class="ui-panel glass rounded-2xl p-6 shadow-2xl text-white">
  <div class="border-b border-white/10 pb-4 mb-4">
    <h1 class="text-2xl font-black mb-1" id="ui-title">Fleet Dashboard</h1>
    <p class="text-xs text-slate-400 uppercase tracking-widest">Select a bus on the map to view live details</p>
  </div>

  <div id="bus-data" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
    <div class="flex items-center gap-3 mb-5">
      <div id="ui-color" class="w-4 h-4 rounded-full bg-slate-500"></div>
      <h2 id="busId" class="text-xl font-bold tracking-widest">--</h2>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-black/40 rounded-xl p-3 border border-white/5">
        <p class="text-[9px] uppercase text-slate-400 mb-1 font-bold">Current Stop</p>
        <p class="text-md font-bold text-teal-400 truncate" id="currentStop">--</p>
      </div>
      <div class="bg-black/40 rounded-xl p-3 border border-white/5">
        <p class="text-[9px] uppercase text-slate-400 mb-1 font-bold">Next Stop</p>
        <p class="text-md font-bold text-white truncate" id="nextStop">--</p>
      </div>
    </div>
    
    <div class="bg-white/5 rounded-xl p-4 border border-white/10 text-center mb-4">
      <p class="text-[10px] uppercase text-slate-400 mb-1">Live ETA</p>
      <p class="text-3xl font-mono font-bold" id="eta">--<span class="text-xs ml-1 text-slate-500">min</span></p>
    </div>

    <!-- Live Itinerary List -->
    <div>
      <p class="text-[10px] uppercase tracking-widest text-slate-400 mb-2">Route Itinerary</p>
      <div id="stops-list" class="space-y-2 text-xs text-slate-300 max-h-32 overflow-y-auto">
        <!-- populated dynamically -->
      </div>
    </div>
  </div>
</div>

<script>
  // 1. Core Mapbox Init
  mapboxgl.accessToken = 'pk.eyJ1IjoieWFhay1kcml2aW5nLWN1cnJpY3VsdW0' + 'iLCJhIjoiY2txYzJqb3FwMWZweDJwbXY0M3R5cDAzYyJ9.vfIvUIpyVbBXqPjOjM7hEg';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11', 
    center: [-73.9851, 40.7589], // NYC Grid
    zoom: 14.5,
    pitch: 60,
    bearing: -15,
    antialias: true
  });

  map.on('style.load', () => {
    map.insertLayer({
      id: '3d-buildings',
      source: 'composite',
      'source-layer': 'building',
      filter: ['==', 'extrude', 'true'],
      type: 'fill-extrusion',
      minzoom: 14,
      paint: {
        'fill-extrusion-color': '#1e293b',
        'fill-extrusion-height': ['get', 'height'],
        'fill-extrusion-opacity': 0.8
      }
    });
  });

  // 2. Define Fleet Data
  const fleet = [
    {
      id: 'BUS-01 (Express)', color: '#10b981', // Emerald
      start: [-73.9851, 40.7589], end: [-73.9682, 40.7634],
      speedMod: 0.8,
      data: { route: [], stops: [], currentIdx: 0, marker: null }
    },
    {
      id: 'BUS-02 (Local)', color: '#3b82f6', // Blue
      start: [-73.9857, 40.7484], end: [-73.9832, 40.7536],
      speedMod: 1.1,
      data: { route: [], stops: [], currentIdx: 0, marker: null }
    },
    {
      id: 'BUS-03 (Campus)', color: '#fbbf24', // Amber
      start: [-73.9936, 40.7505], end: [-74.0016, 40.7441],
      speedMod: 0.9,
      data: { route: [], stops: [], currentIdx: 0, marker: null }
    }
  ];

  let selectedBus = null;
  let activeStopMarkers = [];

  // Icon SVG
  const busIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>`;

  async function initializeFleet() {
    for (let bus of fleet) {
      // Fetch dynamic routes from Mapbox
      const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${bus.start[0]},${bus.start[1]};${bus.end[0]},${bus.end[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;
      const res = await fetch(url);
      const resData = await res.json();
      
      const coords = resData.routes[0].geometry.coordinates;
      bus.data.route = coords;
      
      // Calculate 5 fake stops distributed evenly
      for (let s = 1; s <= 5; s++) {
        let stopCoord = coords[Math.floor((coords.length - 1) * (s / 5))];
        bus.data.stops.push({ name: `${bus.id.split(' ')[0]} Stop ${s}`, coord: stopCoord });
      }

      // Create physical marker
      const el = document.createElement('div');
      el.className = 'bus-marker text-white';
      el.style.backgroundColor = bus.color;
      el.innerHTML = busIcon;

      bus.data.marker = new mapboxgl.Marker({ element: el })
        .setLngLat(coords[0])
        .addTo(map);

      // CLICK INTERACTION LOGIC
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectBus(bus, el);
      });
    }

    // Start Engine
    requestAnimationFrame(animateFleet);
  }

  // 3. SELECTION SYSTEM
  function selectBus(bus, element) {
    selectedBus = bus;
    
    // UI marker styling
    document.querySelectorAll('.bus-marker').forEach(m => {
      m.classList.remove('selected');
      m.style.zIndex = 1;
    });
    element.classList.add('selected');
    element.style.color = bus.color; // pulse uses current color
    element.style.zIndex = 100;

    // Build Route Line
    if (map.getSource('active-route')) {
      map.getSource('active-route').setData({
        type: 'Feature', geometry: { type: 'LineString', coordinates: bus.data.route }
      });
      map.setPaintProperty('active-route-layer', 'line-color', bus.color);
    } else {
      map.addSource('active-route', {
        type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: bus.data.route } }
      });
      map.addLayer({
        id: 'active-route-layer', type: 'line', source: 'active-route',
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': bus.color, 'line-width': 6, 'line-opacity': 0.7 }
      }, '3d-buildings');
    }

    // Draw specific bus stops
    activeStopMarkers.forEach(m => m.remove());
    activeStopMarkers = [];
    bus.data.stops.forEach((stop, index) => {
      const stEl = document.createElement('div');
      stEl.className = 'stop-marker';
      stEl.style.backgroundColor = index === 0 ? '#10b981' : '#3b82f6'; // first green, rest blue
      
      const m = new mapboxgl.Marker({ element: stEl }).setLngLat(stop.coord).addTo(map);
      activeStopMarkers.push(m);
    });

    // Update Side Panel
    document.getElementById('bus-data').style.opacity = '1';
    document.getElementById('busId').innerText = bus.id;
    document.getElementById('busId').style.color = bus.color;
    document.getElementById('ui-color').style.backgroundColor = bus.color;
    
    // Center camera with Wow effect
    map.flyTo({
      center: bus.data.route[bus.data.currentIdx],
      zoom: 15.5, pitch: 65, speed: 1.2, essential: true
    });
  }

  // Deselect on map click
  map.on('click', () => {
    selectedBus = null;
    document.querySelectorAll('.bus-marker').forEach(m => m.classList.remove('selected'));
    if (map.getLayer('active-route-layer')) map.removeLayer('active-route-layer');
    if (map.getSource('active-route')) map.removeSource('active-route');
    activeStopMarkers.forEach(m => m.remove());
    document.getElementById('bus-data').style.opacity = '0.3';
  });

  // 4. ANIMATION ENGINE
  let lastTime = 0;
  
  function animateFleet(time) {
    const dt = time - lastTime;
    lastTime = time;

    fleet.forEach(bus => {
      // Speed mechanism: increments index fractionally
      if (!bus.data.fractionalIdx) bus.data.fractionalIdx = 0;
      
      // Advance bus
      bus.data.fractionalIdx += (0.005 * bus.speedMod * (dt / 16));
      let idx = Math.floor(bus.data.fractionalIdx);
      
      if (idx < bus.data.route.length - 1) {
        bus.data.currentIdx = idx;
        const progress = bus.data.fractionalIdx - idx;
        
        // Linear Interpolation for buttery smoothness
        const start = bus.data.route[idx];
        const end = bus.data.route[idx + 1];
        const currentCoord = [
          start[0] + (end[0] - start[0]) * progress,
          start[1] + (end[1] - start[1]) * progress
        ];

        bus.data.marker.setLngLat(currentCoord);

        // UI Updates if this bus is currently selected
        if (selectedBus === bus) {
          // Camera follow
          map.easeTo({ center: currentCoord, duration: 0 });

          // Calculate stops logic roughly
          const stopsLeft = bus.data.stops.length - Math.floor((idx / bus.data.route.length) * bus.data.stops.length);
          document.getElementById('eta').innerHTML = `${stopsLeft * 2}<span class="text-xs ml-1 text-slate-500">min</span>`;
          document.getElementById('currentStop').innerText = `Stop ${Math.max(1, 6 - stopsLeft)}`;
          document.getElementById('nextStop').innerText = `Stop ${Math.max(1, 6 - stopsLeft + 1)}`;
          
          document.getElementById('stops-list').innerHTML = bus.data.stops.map((s, i) => `
            <div class="flex items-center gap-3 py-1 ${i < 5 - stopsLeft ? 'opacity-30' : ''}">
              <div class="w-2.5 h-2.5 rounded-full ${i === 5 - stopsLeft ? 'bg-emerald-400 pulse' : 'border border-slate-500'}"></div>
              <span>${s.name} ${i === 5 - stopsLeft ? '(Arriving)' : ''}</span>
            </div>
          `).join('');
        }
      }
    });

    requestAnimationFrame(animateFleet);
  }

  // Boot
  map.on('load', initializeFleet);

</script>
</body>
</html>
